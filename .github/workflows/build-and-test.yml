name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/GestaoDeUsuarios.slnx

      - name: Build
        run: dotnet build src/GestaoDeUsuarios.slnx --no-restore --configuration Release --warnaserror

      - name: Test
        run: dotnet test src/GestaoDeUsuarios.slnx --no-build --configuration Release --verbosity minimal
